name: Contract Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  conformance:
    name: node conformance
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Fetch contracts
        uses: actions/checkout@v4
        with:
          repository: octomil/octomil-contracts
          ref: main
          path: .contract
          token: ${{ secrets.CROSS_REPO_READ_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install codegen dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Read contract version
        id: contract
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import yaml

          version = yaml.safe_load(pathlib.Path(".contract/contract.yaml").read_text())["version"]
          print(f"version={version}")
          PY

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install SDK dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated contracts
        run: python3 .contract/scripts/sync_generated.py --sdk node --check --target-dir src/_generated

      - name: Run conformance tests
        env:
          CONTRACT_ROOT: ${{ github.workspace }}/.contract
          CONTRACT_VERSION: ${{ steps.contract.outputs.version }}
        run: |
          pnpm vitest run tests/conformance/contract.test.ts --reporter=default
          python3 .contract/ci/audit-sdks.py --sdk node --sdk-path . --out parity_report.json

      - name: Gate parity score
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          report_path = pathlib.Path("parity_report.json")
          if not report_path.exists():
              print("::error::No parity report generated.")
              sys.exit(1)
          score = json.loads(report_path.read_text()).get("summary", {}).get("parityScore", 0)
          print(f"Parity score: {score}% (floor: 60%)")
          if float(score) < 60:
              print(f"::error::Parity score {score}% is below floor 60%")
              sys.exit(1)
          PY

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-node-${{ steps.contract.outputs.version }}
          path: parity_report.json
          retention-days: 90

  conformance-complete:
    name: Contract Conformance Complete
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - conformance
    if: always()
    permissions:
      contents: read
    steps:
      - name: Verify conformance succeeded
        run: |
          set -euo pipefail
          results='${{ toJSON(needs.*.result) }}'
          echo "Needed job results: ${results}"
          if echo "${results}" | grep -Eq '"(failure|cancelled|skipped)"'; then
            echo "::error::Contract conformance failed, was cancelled, or was skipped."
            exit 1
          fi
          echo "Contract conformance complete."
