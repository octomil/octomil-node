name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.2.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm test

      - run: pnpm run build

      - run: pnpm run exports:check

      - run: pnpm run pack:check

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - test
    if: always()
    steps:
      - name: Verify CI jobs succeeded
        run: |
          set -euo pipefail
          results='${{ toJSON(needs.*.result) }}'
          echo "Needed job results: ${results}"
          if echo "${results}" | grep -Eq '"(failure|cancelled|skipped)"'; then
            echo "::error::One or more CI jobs failed, were cancelled, or were skipped."
            exit 1
          fi
          echo "CI complete."
